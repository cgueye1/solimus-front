<div class="py-3">
  <div class="card border-0 p-3 shadow-sm">

    <!-- Header -->
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">
      <h5 class="mb-0">Statistiques des charges</h5>

      <!-- Filtre mois -->
      <input
        type="month"
        class="form-control w-auto"
        [(ngModel)]="selectedMonth"
        (change)="onMonthChange()"
      />
    </div>

    <!-- Grid : 2 par ligne -->
    <div class="row g-3">
      <div class="col-lg-6 col-md-6 col-sm-12">
        <div class="stat-card">
          <div class="icon bg-primary">
            <i class="material-icons">description</i>
          </div>
          <div>
            <p class="label">Nombre d’appels de charges</p>
            <h4>{{ totalCalls }}</h4>
          </div>
        </div>
      </div>

      <div class="col-lg-6 col-md-6 col-sm-12">
        <div class="stat-card">
          <div class="icon bg-warning">
            <i class="material-icons">account_balance_wallet</i>
          </div>
          <div>
            <p class="label">Montant total</p>
            <h4>{{ totalAmount | number }} FCFA</h4>
          </div>
        </div>
      </div>

      <div class="col-lg-6 col-md-6 col-sm-12">
        <div class="stat-card">
          <div class="icon bg-success">
            <i class="material-icons">check_circle</i>
          </div>
          <div>
            <p class="label">Montant collecté</p>
            <h4>{{ collectedAmount | number }} FCFA</h4>
          </div>
        </div>
      </div>

      <div class="col-lg-6 col-md-6 col-sm-12">
        <div class="stat-card">
          <div class="icon bg-danger">
            <i class="material-icons">hourglass_empty</i>
          </div>
          <div>
            <p class="label">Montant en attente</p>
            <h4>{{ pendingAmount | number }} FCFA</h4>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
