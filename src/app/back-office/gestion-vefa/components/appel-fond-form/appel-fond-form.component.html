<div class="modal-header">
  <h4 class="modal-title" id="modal-basic-title">
    {{
      singleLot.rental
        ? isEditMode
          ? "Modifier avis d'échéance"
          : "Ajouter avis d'échéance"
        : isEditMode
          ? "Modifier Appel de fonds"
          : "Ajouter Appel de fonds"
    }}
  </h4>
  <button
    type="button"
    class="btn-close"
    aria-label="Close"
    (click)="modal.dismissAll()"
  ></button>
</div>

<div class="modal-body">
  <form [formGroup]="appelFondForm" (ngSubmit)="onSubmit()">
    <div class="row g-4">
      <div class="col-lg-12">
        <label class="form-label">Titre</label>
        <input
          formControlName="label"
          class="form-control"
          placeholder="Saisir"
        />
      </div>

      <div class="col-lg-12" *ngIf="!singleLot.rental">
        <label class="form-label">Pourcentage Appelé (%)</label>
        <input
          type="number"
          step="0.01"
          min="0"
          max="100"
          formControlName="percentage"
          class="form-control"
          placeholder="Ex: 25.5"
          (input)="onPercentageChange()"
        />
      </div>

      <div class="col-lg-12"  *ngIf="!singleLot.rental">
        <label class="form-label">Montant</label>
        <input
          type="text"
          formControlName="amount"
          class="form-control"
          placeholder="Saisir le montant"
          (input)="onAmountChange()"
        />
      </div>
      
       <div class="col-lg-12"  *ngIf="singleLot.rental">
        <label class="form-label">LOYER </label>
        <input
          type="text"
          formControlName="amount"
          class="form-control"
          placeholder="Saisir le montant"
          (input)="formatAmount()"
        />
      </div>

      <div class="col-lg-12" *ngIf="singleLot.rental">
        <label class="form-label">Provision T.O.M </label>
        <input
          type="text"
          formControlName="tom"
          class="form-control"
          placeholder="Saisir le montant"
          (input)="formatAmountTOM()"
        />
      </div>
      <div class="col-lg-12" *ngIf="singleLot.rental">
        <label class="form-label">TVA (%)</label>
        <input
          type="number"
          step="0.01"
          min="0"
          max="100"
          formControlName="tva"
          class="form-control"
          placeholder="Ex : 18%"
        
        />
      </div>

      <div class="col-lg-12">
        <label class="form-label">Date Prévue</label>
        <input
          type="date"
          formControlName="expectedDate"
          class="form-control"
        />
      </div>
    </div>

    <div class="modal-footer">
      <button type="submit" class="button button-primary">
        {{ isEditMode ? "Modifier" : "Enregistrer" }}
      </button>
      <button
        class="button button-outline-primary"
        type="button"
        (click)="modal.dismissAll()"
      >
        Annuler
      </button>
    </div>
  </form>
</div>
