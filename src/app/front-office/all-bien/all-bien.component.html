<section class="pb-5">
  <div class="container">
    <div class="row mb-4">
      <div class="col-lg-12">
        <div class="navigate__route__page">
          <button class="button button-light" (click)="goReturn()">
            Retour
          </button>
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb breadcrumb-fo">
              <li class="breadcrumb-item">
                <a href="#" [routerLink]="['/accueil']">Accueil</a>
              </li>
              <li class="breadcrumb-item active" aria-current="page">
                Biens immobilier
              </li>
            </ol>
          </nav>
        </div>
      </div>
    </div>
    <!-- list des biens -->
    <div class="row g-3">
      <div class="col-lg-4">
        <div class="filter__box">
          <div class="filter__box-header">
            <h5 class="filter__box-header-title">Filtrer</h5>
            <a
              class="button button-white"
              type="button"
              (click)="searchForm.reset(); onSearch()"
              >Effacer les filtres</a
            >
          </div>
          <div class="filter__box-body">
            <form [formGroup]="searchForm" (ngSubmit)="onSearch()">
              <div class="row gy-4">
                <div class="col-lg-12">
                  <label class="form-label">Nom du projet</label>
                  <input
                    type="text"
                    class="form-control"
                    placeholder="Rechercher par nom"
                    formControlName="name"
                  />
                </div>
                <div class="col-lg-12">
                  <label class="form-label">Localisation</label>
                  <app-location-input
                    [apiKey]="googleMapsApiKey"
                    (locationSelected)="onLocationSelected($event)"
                  
                  ></app-location-input>
                  <!--<input
                    type="text"
                    class="form-control"
                    placeholder="Recherche par localisation"
                    formControlName="address"
                  />-->
                </div>

                <div class="col-lg-12">
                  <label class="form-label">Type de bien</label>
                  <select class="form-select" formControlName="propertyTypeId">
                    <option value="">Sélectionner</option>
                    <option
                      *ngFor="let type of propertyTypeList"
                      [value]="type.id"
                    >
                      {{ type.typeName }}
                    </option>
                  </select>
                </div>
                <!----<div class="col-lg-12">
                  <label class="form-label">Prix</label>
                  <input formControlName="maxPrice" 
                         [min]="minPrix" [max]="maxPrix" 
                         type="range" class="form-control custom-range" 
                         (input)="onPrixChange($event)" />
                  <div class="dflex-between">
                    <small>{{ formatPrix(minPrix) }}</small>
                    <small id="curr">{{ formatPrix(prix) }}</small>
                  </div>
                </div>-->

                <div class="col-lg-12">
                  <button
                    class="button button-primary w-100"
                    (click)="onSearch()"
                  >
                    Rechercher
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
      <div class="col-lg-8">
        <!-- Liste des biens -->
        <ng-container *ngIf="bienList && bienList.length > 0; else emptyState">
          <ng-container *ngFor="let bien of bienList">
            <app-card-bien-horizo
              [data]="bien"
              (callback)="onView(bien)"
            ></app-card-bien-horizo>
          </ng-container>
        </ng-container>

        <!-- État vide -->
        <ng-template #emptyState>
          <div class="empty-state text-center p-5">
            <div class="empty-icon mb-3">
              <i class="bi bi-house-slash"></i>
            </div>
            <h5 class="mb-2">Aucun bien trouvé</h5>
            <p class="text-muted mb-4">
              Aucun bien immobilier ne correspond à vos critères de recherche.
            </p>
            <button
              class="button button-light"
              (click)="searchForm.reset(); onSearch()"
            >
              Réinitialiser les filtres
            </button>
          </div>
        </ng-template>
      </div>
    </div>
  </div>
</section>
